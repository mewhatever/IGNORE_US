services:
  postgres:
    image: postgres:16-alpine
    container_name: queuestorm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-queuestorm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-queuestorm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-queuestorm}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-queuestorm} -d ${POSTGRES_DB:-queuestorm}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
